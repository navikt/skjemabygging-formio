version: 2
registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{secrets.READER_TOKEN}}
    replaces-base: false
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    exclude-paths:
      - 'mocks/**'
    registries:
      - npm-github
    schedule:
      interval: 'monthly'
    versioning-strategy: increase
    open-pull-requests-limit: 10
    # Default updates flow into one grouped minor/patch PR.
    # Major updates remain individual PRs unless ignored below.
    groups:
      all-minor-patch:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: 'formiojs'
      - dependency-name: '@formio/react'
      - dependency-name: 'react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react-dom'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@types/react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@types/react-dom'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      all:
        patterns:
          - '*'
