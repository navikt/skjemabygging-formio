version: 2
registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{secrets.READER_TOKEN}}
    replaces-base: false
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    exclude-paths:
      - 'mocks/**'
    registries:
      - npm-github
    schedule:
      interval: 'monthly'
    versioning-strategy: increase
    open-pull-requests-limit: 10
    # Default updates flow into one grouped minor/patch PR and one grouped major PR.
    # Only selected major upgrades stay separate for higher-signal review.
    groups:
      all-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      all-major:
        patterns:
          - '*'
        exclude-patterns:
          - '@navikt/ds-*'
          - '@navikt/aksel-icons'
          - '@navikt/aksel'
          - '@navikt/nav-dekoratoren-moduler'
          - 'csp-header'
          - 'html-react-parser'
          - 'react-router'
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
        update-types:
          - 'major'
      aksel-major:
        patterns:
          - '@navikt/aksel'
          - '@navikt/ds-*'
          - '@navikt/aksel-icons'
        update-types:
          - 'major'
      nav-dekoratoren-major:
        patterns:
          - '@navikt/nav-dekoratoren-moduler'
          - 'csp-header'
          - 'html-react-parser'
        update-types:
          - 'major'
      react-router-major:
        patterns:
          - 'react-router'
        update-types:
          - 'major'
    ignore:
      - dependency-name: 'formiojs'
      - dependency-name: '@formio/react'
      - dependency-name: 'react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react-dom'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@types/react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@types/react-dom'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      all:
        patterns:
          - '*'
