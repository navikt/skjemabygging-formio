name: Production forms Cypress Tests
run-name: Production forms Cypress [${{ github.ref_name }}]

on:
  workflow_dispatch:

env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cypress-run-fyllut-production:
    name: fyllut production
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: read
      packages: read
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          cache: 'yarn'
          cache-dependency-path: '**/yarn.lock'
          registry-url: https://npm.pkg.github.com/
          scope: '@navikt'
      - name: set timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: 'Europe/Oslo'
      - name: 'Install dependencies'
        run: yarn --frozen-lockfile
      - name: 'Build fyllut'
        run: yarn build:fyllut
      - name: 'Run mock server'
        run: yarn mocks:fyllut:no-cli &
      - name: 'Cypress tests (fyllut production)'
        uses: cypress-io/github-action@v7
        with:
          install: false
          start: yarn preview:fyllut
          wait-on: 'http://localhost:3001/fyllut/internal/isready'
          wait-on-timeout: 120
          command: yarn cypress:fyllut --spec "cypress/e2e/production/*" --env INCLUDE_DIST_TESTS=true
        env:
          FYLLUT_BACKEND_LOGLEVEL: ${{ runner.debug == '1' && 'debug' || 'error' }}
      - name: Upload screenshots
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: cypress-production-screenshots
          path: ${{ github.workspace }}/packages/fyllut/cypress/screenshots/*
