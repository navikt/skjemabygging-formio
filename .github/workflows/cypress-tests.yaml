name: Cypress Tests

on: push
env:
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  setup-fyllut:
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: read
      packages: read
    outputs:
      cypress-folders: ${{ steps.generate-cypress-folders.outputs.cypress-folders }}
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
      - name: Generate list of folders containing cypress tests
        id: generate-cypress-folders
        run: |
          echo cypress-folders=$(node bin/get-folders.mjs packages/fyllut/cypress/e2e) >> "$GITHUB_OUTPUT"

  cypress-run-fyllut:
    name: fyllut ${{ matrix.folder }}
    runs-on: ubuntu-latest-8-cores
    needs: [setup-fyllut]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJSON(needs.setup-fyllut.outputs.cypress-folders) }}
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
          registry-url: https://npm.pkg.github.com/
          scope: '@navikt'
      - name: set timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: 'Europe/Oslo'
      - name: 'Install dependencies'
        run: pnpm install --frozen-lockfile
      - name: 'Install Cypress binary (fyllut)'
        run: pnpm --dir packages/fyllut exec cypress install
      - name: 'Build fyllut'
        run: pnpm build:fyllut
      - name: 'Run mock server'
        run: pnpm mocks:fyllut:no-cli > /tmp/fyllut-mocks.log 2>&1 &
      - name: 'Start fyllut preview'
        run: pnpm preview:fyllut > /tmp/fyllut-preview.log 2>&1 &
      - name: 'Wait for fyllut preview'
        run: |
          for attempt in $(seq 1 120); do
            if curl --silent --fail http://localhost:3001/fyllut/internal/isready > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/fyllut-preview.log
          exit 1
      - name: 'Cypress tests (fyllut)'
        run: pnpm --dir packages/fyllut exec cypress run --browser electron --spec cypress/e2e/${{ matrix.folder }}/**/* --env INCLUDE_DIST_TESTS=true
        env:
          FYLLUT_BACKEND_LOGLEVEL: ${{ runner.debug == '1' && 'debug' || 'error' }}
      - name: Upload screenshots
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: cypress-screenshots-${{ strategy.job-index }}
          path:  ${{ github.workspace }}/packages/fyllut/cypress/screenshots/*


  cypress-run-bygger:
    runs-on: ubuntu-latest-8-cores
    permissions:
      contents: 'read'
      packages: read
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
          registry-url: https://npm.pkg.github.com/
          scope: '@navikt'
      - name: set timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: 'Europe/Oslo'
      - name: 'Install dependencies'
        run: pnpm install --frozen-lockfile
      - name: 'Install Cypress binary (bygger)'
        run: pnpm --dir packages/bygger exec cypress install
      - name: 'Build bygger'
        run: pnpm build:bygger
      - name: 'Start bygger preview'
        run: pnpm preview:bygger > /tmp/bygger-preview.log 2>&1 &
      - name: 'Wait for bygger preview'
        run: |
          for attempt in $(seq 1 120); do
            if curl --silent --fail http://localhost:3000/internal/isready > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/bygger-preview.log
          exit 1
      - name: 'Cypress tests (bygger)'
        run: pnpm --dir packages/bygger exec cypress run --browser electron
      - name: Upload screenshots
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: cypress-bygger-screenshots-${{ strategy.job-index }}
          path:  ${{ github.workspace }}/packages/bygger/cypress/screenshots/*
